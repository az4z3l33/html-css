<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexbox</title>
    <style>
        div.pai {
            background-color: lightsalmon;

            display: flex;
            height: 80px;
            flex-flow: row wrap;
            justify-content: space-between;
        }

        div.item {
            background-color: lightblue;
            border: 1px solid black;

            text-align: center;
            flex: auto;
        }
    </style>
</head>
<body>
    <div class="pai">
        <div class="item"> Exemplo de block A</div>
        <div class="item"> Exemplo de block B</div>
        <div class="item"> Exemplo de block C</div>
        <div class="item"> Exemplo de block D</div>
        <div class="item"> Exemplo de block E</div>
        <div class="item"> Exemplo de block F</div>
        <div class="item"> Exemplo de block G</div>
    </div>
</body>
</html>
