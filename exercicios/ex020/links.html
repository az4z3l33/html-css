<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Links</title>
    <style>

        /*  SELETORES PERSONALIZADOS    
            # = id
            . = class
            : = pseudo classe
            :: = pseudo elemento
            > = filho direto
        */
        body {
            font-family: Arial, Helvetica, sans-serif;
        }

        a {
            color: red;
            text-decoration: none;
            font-weight: bold;
        }

        a:visited {
            color: darkred;
        }

        a:hover {
            color: black;
            text-decoration: underline;
        }

        a:active {
            color: rgb(255, 238, 0);
        }

        .especial {
            background-color: rgb(212, 126, 126);
        }

        .especial::before {
            content: "⇛";

        }

        .especial::after {
            content: "⇚";

        }
    </style>
</head>
<body>
    <h1>personalizando links</h1>
<ul>
    <li><a href="https://gustavoguanabara.github.io" target="_blank">Repositorio Github</a></li>
    <li><a href="https://www.youtube.com/cursoemvideo" target="_blank" class="especial">Canal do youtube</a></li>
    <li><a href="https://www.cursoemvideo.com" target="_blank">Site do cursoemVideo</a></li>
</ul>
    
</body>
</html>
