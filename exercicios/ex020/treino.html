<html lang="pt-br">
<head>

    <title>Treino</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
        }
        div > picture {
            display: none;
        }

        div:hover > picture {
            display: block;
        }

        .video:hover {
            display: block;
             color: red;
        }

        .video {
            text-decoration: underline;
            color: rgb(105, 13, 13);
        }

        img {
            width: 500px;
        }
    </style>
</head>
<body>
    <h1>Treinando pseudoclasses e links</h1>
    <ul>
        <li>
            <div>
                <h1 class="video">Re7 Madhouse</h1>
                
                    <picture>
                        <a href="https://www.youtube.com/watch?v=xW646kMqxDw" class="re7" target="_blank"><img src="re7.jpeg" alt="Imagem de re7 madhouse"></a>
                    </picture>
            </div>
        
        
        </li>
    </ul>

    
</body>
</html>
