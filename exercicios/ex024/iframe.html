<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iframe</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
        }

        iframe { /* tamanho padrao de 300x150px */
            border: 1px solid black;
            box-shadow: 0px 1px 5px rgba(0, 0, 0, 0.651);
        }

        #curso {
            height: 500px;
        }

        #repositorio {
            height: 500px;

        }

    </style>
</head>
<body>
    <h1>Testando o uso de um Iframe</h1>
    <p>
        Acessando o site 
        <iframe src="https://www.cursoemvideo.com" frameborder="0" id="curso">
            <a href="https://www.cursoemvideo.com" target="_blank"></a>
        </iframe> 
        para aprender a programar
    </p>
    <p>
        O repósitorio do Guanabara 
        <iframe src="https://gustavoguanabara.github.io" frameborder="0" id="repositorio">
            <a href="https://gustavoguanabara.github.io" target="_blank">Github</a>
        </iframe> 
        também é bem legal
    </p>
</body>
</html>
