<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gradientes em CSS</title>
    <style>
        nav {
    width: 100%;
    padding: 10px;
    margin-bottom: 20px;
    box-shadow: 5px 5px 10px 10px #051818;
}
        * { /*configurações globais das css*/
            height: 100%;
        }
        body {
            background-image: linear-gradient( 45deg, #7308FF 20%, #C500F0, #FF00C5, #FF005F, #FF6002, #FFC600);
            background-attachment: fixed;
        }
    </style>
</head>
<body>
    <nav>
    <h1>Testando gradientes</h1>
    </nav>
    
</body>
</html>
