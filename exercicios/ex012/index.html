    <link rel="shortcut icon" href="logo roblox.ico" type="image/x-icon">
    <title>Videos</title>
</head>
<body>
    <h1>Inserindo vídeos hospedados localmete</h1>
    <p>Este vídeo está hospedado no meu próprio servidor</p>
    <video width="560" poster="midia/limoes-capa.png" autoplay loop controls>
        <source src="midia/meu-video.mp4" type="video/mp4">

        <source src="midia/meu-video.ogv" type="video/ogv">
        <p>seu navegador não tem compatibilidade com esse vídeo, <a href="midia/meu-video.mp4">clique aqui para baixa-lo</a></p>
    </video>

    <h1>Inserindo vídeos do Youtube</h1>
         <iframe width="560" height="315" src="https://www.youtube.com/embed/hlwlM4a5rxg?si=PNfrIbVkcdELGA5t" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
