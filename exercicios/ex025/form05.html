<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario</title>
</head>
<body>
    <h1>Exemplo de formulario</h1>
    <form action="cadastro.php" method="get" autocomplete="on"></form>
    <fieldset>
        <legend>Sexo</legend>
        <input type="radio" name="sexo" id="imas"> <label for="imas">Masculino</label>
        <input type="radio" name="sexo" id="ifem" checked> <label for="ifem">Feminino</label>
    </fieldset>
    <fieldset>
        <legend>Esportes favoritos</legend>
        
        <input type="checkbox" name="fut" id="ifut" checked> <label for="ifut">Futebol</label> <br>

        <input type="checkbox" name="bas" id="ibas"> <label for="ibas">Basquete</label> <br>

        <input type="checkbox" name="vol" id="ivol" checked> <label for="ivol">Volei</label> <br>

        <input type="checkbox" name="nat" id="inat"> <label for="inat">Natação</label> <br>

    </fieldset>
    <p>
        <input type="submit" value="Enviar">
        <input type="reset" value="Limpar">
    </p>
</body>
</html>
